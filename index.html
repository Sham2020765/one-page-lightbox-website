<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pet Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <ul id="navBorder">
            <li><a href="index.html">HOME</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
        <ul>
            <li><a href="#cat">Cats & Kittens</a></li>
            <li><a href="#dog">Dogs & Puppies</a></li>
            <li><a href="#rabbit">Rabbits</a></li>
            <li><a href="#guineapig">Guinea Pigs</a></li>
            <li><a href="#fish">Fish</a></li>
            <li><a href="#reptile">Reptiles</a></li>
        </ul>
    </div>

    <header>
        <div>
            <h1 class="animateText">Welcome to The Pet Shop!</h1>
        </div>
    </header>

    <main class="gallery-container">
        <h2>Our Beautiful Pets</h2>
        <div class="gallery">
            <div class="gallery-item" id="cat">
                <img src="cat.png" alt="Cats & Kittens" class="lightbox-trigger">
            </div>
            <div class="gallery-item" id="dog">
                <img src="dog.png" alt="Dogs & Puppies" class="lightbox-trigger">
            </div>
            <div class="gallery-item" id="rabbit">
                <img src="rabbits.png" alt="Rabbits" class="lightbox-trigger">
            </div>
            <div class="gallery-item" id="guineapig">
                <img src="guineapigs.png" alt="Guinea Pigs" class="lightbox-trigger">
            </div>
            <div class="gallery-item" id="fish">
                <img src="fish.png" alt="Fish" class="lightbox-trigger">
            </div>
            <div class="gallery-item" id="reptile">
                <img src="beardedDragon.png" alt="Reptiles" class="lightbox-trigger">
            </div>
        </div>
    </main>

    <div id="lightboxModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="imgModal">
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
